<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="48" fill="url(#bg-gradient)"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161514;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drop-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:0" />
      <stop offset="60%" style="stop-color:#c9b87a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Border -->
  <rect width="192" height="192" rx="48" fill="none" stroke="#2a2820" stroke-width="2"/>
  
  <!-- Drop Line -->
  <rect x="90" y="56" width="12" height="40" rx="6" fill="url(#drop-gradient)"/>
  
  <!-- Drop Arrow -->
  <path d="M 96 116 L 64 96 L 128 96 Z" fill="#c9b87a" filter="url(#glow)"/>
  
  <!-- Shelf -->
  <rect x="64" y="128" width="64" height="8" rx="4" fill="#c9b87a" filter="url(#glow)"/>
</svg>
