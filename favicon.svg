<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg-gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161514;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drop-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#c9b87a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Border -->
  <rect width="48" height="48" rx="12" fill="none" stroke="#2a2820" stroke-width="1"/>
  
  <!-- Drop Line -->
  <rect x="23.25" y="14" width="1.5" height="10" rx="0.75" fill="url(#drop-gradient)"/>
  
  <!-- Drop Arrow -->
  <path d="M 24 29 L 20 24 L 28 24 Z" fill="#c9b87a" filter="url(#glow)"/>
  
  <!-- Shelf -->
  <rect x="16" y="32" width="16" height="2" rx="1" fill="#c9b87a" filter="url(#glow)"/>
  
  <!-- Glow Effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
