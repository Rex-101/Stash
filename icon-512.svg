<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161514;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drop-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:0" />
      <stop offset="60%" style="stop-color:#c9b87a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Border -->
  <rect width="512" height="512" rx="128" fill="none" stroke="#2a2820" stroke-width="4"/>
  
  <!-- Drop Line -->
  <rect x="240" y="150" width="32" height="106" rx="16" fill="url(#drop-gradient)"/>
  
  <!-- Drop Arrow -->
  <path d="M 256 310 L 170 256 L 342 256 Z" fill="#c9b87a" filter="url(#glow)"/>
  
  <!-- Shelf -->
  <rect x="170" y="342" width="172" height="20" rx="10" fill="#c9b87a" filter="url(#glow)"/>
</svg>
